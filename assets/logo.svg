<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 108" width="99" height="108">
  <title>FaithGate — pass/fail pixel shield</title>
  <!-- left half: pass (green) -->
  <g fill="#639922">
    <rect x="9" y="0" width="81" height="9"/>
    <rect x="0" y="9" width="99" height="45"/>
    <rect x="9" y="54" width="81" height="18"/>
    <rect x="18" y="72" width="63" height="9"/>
    <rect x="27" y="81" width="45" height="9"/>
    <rect x="36" y="90" width="27" height="9"/>
  </g>
  <!-- right half: fail (red) -->
  <g fill="#E24B4A">
    <rect x="54" y="0" width="36" height="9"/>
    <rect x="54" y="9" width="45" height="45"/>
    <rect x="54" y="54" width="36" height="18"/>
    <rect x="54" y="72" width="27" height="9"/>
    <rect x="54" y="81" width="18" height="9"/>
    <rect x="54" y="90" width="9" height="9"/>
  </g>
  <!-- the gate line -->
  <rect x="45" y="0" width="9" height="108" fill="#2C2C2A"/>
</svg>
